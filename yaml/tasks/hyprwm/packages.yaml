- name: Installing linux additional packages for Debian
  become: true
  when: ansible_facts.os_family == DEB
  ansible.builtin.apt:
      update_cache: true
      state: present
      install_recommends: false
      name:
          - flatpak
          - thunar
          - ristretto
          - mousepad
          - okular
          - file-roller
          - udiskie
          - tlp
          - wl-clipboard
          - cliphist
          - network-manager-applet
          - nm-connection-editor
          - pavucontrol
          - socat
          - thunar-archive-plugin
          - gvfs
          - gvfs-backends
          - ffmpegthumbnailer
          - tumbler
          - webp-pixbuf-loader
          - mpv-mpris
          - xdg-user-dirs
  tags: hyprwm

- name: Installing linux additional package for Archlinux
  become: true
  when: ansible_facts.os_family == ARCH
  community.general.pacman:
      update_cache: true
      state: present
      name:
          - flatpak
          - thunar
          - ristretto
          - mousepad
          - okular
          - file-roller
          - udiskie
          - tlp
          - wl-clipboard
          - cliphist
          - network-manager-applet
          - nm-connection-editor
          - pavucontrol
          - socat
          - thunar-archive-plugin
          - gvfs
          - gvfs-mtp
          - ffmpegthumbnailer
          - tumbler
          - webp-pixbuf-loader
          - mpv-mpris
          - xdg-user-dirs
  tags: hyprwm

- name: Adding the flatpak repository remote
  community.general.flatpak_remote:
      name: flathub
      flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
      state: present
      method: user
  tags: hyprwm

- name: Installing app using flatpak
  community.general.flatpak:
      method: user
      state: present
      name:
          - com.github.tchx84.Flatseal
          - com.google.Chrome
          - org.chromium.Chromium
          - md.obsidian.Obsidian
  tags: hyprwm

- name: Configuring flatpak
  ansible.builtin.shell: |
      flatpak override --user --allow=bluetooth

      flatpak override --user --device=dri
      flatpak override --user --device=input
      flatpak override --user --device=shm
      flatpak override --user --device=all

      flatpak override --user --socket=x11
      flatpak override --user --socket=wayland
      flatpak override --user --socket=pulseaudio
      flatpak override --user --socket=session-bus
      flatpak override --user --socket=system-bus
      flatpak override --user --socket=ssh-auth
      flatpak override --user --socket=inherit-wayland-socket

      flatpak override --user --filesystem=home
      flatpak override --user --filesystem=xdg-config/gtk-3.0:ro
      flatpak override --user --filesystem=xdg-config/gtk-4.0:ro
      flatpak override --user --filesystem=xdg-config/Kvantum:ro
      flatpak override --user --filesystem=xdg-data/themes:ro
      flatpak override --user --filesystem=xdg-data/fonts:ro

      flatpak override --user --env=QT_STYLE_OVERRIDE=kvantum
      flatpak override --user --env=QT_QPA_PLATFORM="wayland;xcb"
      flatpak override --user --env=ELECTRON_OZONE_PLATFORM_HINT=auto
      flatpak override --user --env=GTK_THEME="{{ GTK_THEME }}"
  tags: hyprwm

- name: Configuring udiskie mountpoint
  become: true
  ansible.builtin.lineinfile:
      path: '{{ item.path }}'
      line: '{{ item.line }}'
      regexp: '{{ item.regexp }}'
      state: present
      create: true
  loop:
      - {
            path: /etc/tmpfiles.d/media.conf,
            line: D /media 0755 root root 0 -,
            regexp: '^D\s*\/media.*root',
        }
      - {
            path: /etc/udev/rules.d/99-udisks2.rules,
            line: 'ENV{ID_FS_USAGE}=="filesystem|other|crypto", ENV{UDISKS_FILESYSTEM_SHARED}="1"',
            regexp: '^ENV{ID_FS_USAGE}==',
        }
  tags: hyprwm

- name: Configuring udiskie mount options
  become: true
  ansible.builtin.ini_file:
      path: /etc/udisks2/mount_options.conf
      section: defaults
      option: '{{ item.option }}'
      value: '{{ item.value }}'
      state: present
      create: true
  loop:
      - {
            option: exfat_defaults,
            value: 'uid=$UID,gid=$GID,iocharset=utf8,errors=remount-ro,sync',
        }
      - {
            option: exfat_allow,
            value: 'uid=$UID,gid=$GID,flush,dmask,errors,fmask,iocharset,namecase,umask,sync',
        }
      - {option: ntfs:ntfs3_defaults, value: 'uid=\$UID,gid=\$GID'}
      - {
            option: ntfs:ntfs3_allow,
            value: 'uid=$UID,gid=$GID,flush,umask,dmask,fmask,iocharset,discard,nodiscard,sparse,nosparse,hidden,nohidden,sys_immutable,nosys_immutable,showmeta,noshowmeta,prealloc,noprealloc,hide_dot_files,nohide_dot_files,windows_names,nocase,case',
        }
  tags: hyprwm

- name: Configuring tlp options
  become: true
  ansible.builtin.ini_file:
      path: /etc/tlp.conf
      option: '{{ item.option }}'
      value: '{{ item.value }}'
      create: true
      no_extra_spaces: true
  loop:
      - {option: START_CHARGE_THRESH_BAT0, value: 75}
      - {option: STOP_CHARGE_THRESH_BAT0, value: 80}
      - {option: START_CHARGE_THRESH_BAT1, value: 75}
      - {option: STOP_CHARGE_THRESH_BAT1, value: 80}
      - {option: RESTORE_THRESHOLDS_ON_BAT, value: 1}
  tags: hyprwm

- name: Bookmark xdg-user-dirs folder
  ansible.builtin.lineinfile:
      path: '{{ CONFIG_DIR }}/gtk-3.0/bookmarks'
      line: 'file://{{ HOME_DIR }}/{{ item }}'
      regexp: 'file://{{ HOME_DIR }}/{{ item }}'
      state: present
      create: true
  loop:
      - Documents
      - Downloads
      - Music
      - Pictures
      - Public
      - Templates
      - Videos
  tags: hyprwm

- name: Enabling tlp using systemd
  become: true
  ansible.builtin.systemd_service:
      name: tlp
      scope: system
      enabled: true
      daemon_reload: true
  tags: hyprwm
